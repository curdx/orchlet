name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf ripgrep

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend build and typecheck
        run: pnpm build

      - name: Fixture and frontend tests
        run: pnpm test

      - name: Rust formatting
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust check
        run: cargo check
        working-directory: src-tauri

      - name: Rust tests and contract export check
        run: TS_RS_EXPORT_DIR=../src/contracts/generated cargo test
        working-directory: src-tauri

      - name: IPC boundary scan
        run: rg -n "@tauri-apps/api|@tauri-apps/plugin-|invoke\\(|listen\\(|Channel|getCurrentWebview|getCurrentWebviewWindow" src src-tauri/src
